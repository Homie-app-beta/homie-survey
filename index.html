<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="3 minutos · Anónimo · Ayúdanos a construir la primera plataforma española de gestión inmobiliaria 360.">
  <title>homie · Cuestionario de validación de mercado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ───────────────────────────────────── */
    :root {
      --navy:#0C1F3F; --navy-d:#060E1D; --blue:#1A6FBF; --blue-l:#EFF6FF;
      --blue-m:rgba(26,111,191,.11); --gold:#C9A257; --green:#16A34A;
      --green-l:#F0FAF3; --amber:#F59E0B; --red:#DC2626;
      --bg:#EDEAE3; --card:#fff; --border:#E5E2DB;
      --t1:#111; --t2:#555; --t3:#888;
      --r:14px; --sh:0 4px 24px rgba(0,0,0,.08);
      --ease:.15s ease;
    }
    /* ── RESET ───────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);
      color:var(--t1);min-height:100vh;display:flex;flex-direction:column;
      font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
    button,input,textarea{font-family:inherit}

    /* ── HEADER ──────────────────────────────────── */
    .hdr{position:sticky;top:0;z-index:100;background:var(--navy);
      box-shadow:0 2px 20px rgba(0,0,0,.28)}
    .hdr-in{max-width:600px;margin:0 auto;padding:0 20px;height:54px;
      display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:9px}
    .logo-txt{font-size:18px;font-weight:300;color:#fff;letter-spacing:-.4px}
    .ctr{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.5px}
    .prog-track{height:3px;background:rgba(255,255,255,.07)}
    .prog-fill{height:3px;background:var(--gold);width:0%;
      transition:width .45s cubic-bezier(.4,0,.2,1)}

    /* ── MAIN ─────────────────────────────────────── */
    .main{flex:1;padding:28px 16px 130px;display:flex;
      flex-direction:column;align-items:center}
    .wrap{width:100%;max-width:580px}

    /* ── ANIMATIONS ──────────────────────────────── */
    @keyframes sR{from{transform:translateX(36px);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes sL{from{transform:translateX(-36px);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes fU{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes pop{0%{transform:scale(.65);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
    .aR{animation:sR .3s cubic-bezier(.4,0,.2,1) both}
    .aL{animation:sL .3s cubic-bezier(.4,0,.2,1) both}
    .aF{animation:fU .38s ease both}
    .aPop{animation:pop .5s cubic-bezier(.34,1.56,.64,1) both}

    /* ── CARD ─────────────────────────────────────── */
    .card{background:var(--card);border-radius:var(--r);padding:32px 28px 28px;
      box-shadow:var(--sh);margin-bottom:14px}
    .eyebrow{font-size:10.5px;font-weight:500;letter-spacing:3px;text-transform:uppercase;
      color:var(--blue);margin-bottom:10px;display:block}
    .eyebrow.gold{color:var(--gold)}
    .q{font-size:19px;font-weight:500;color:var(--navy);line-height:1.4;margin-bottom:5px}
    .sub{font-size:13.5px;color:var(--t2);margin-bottom:22px;line-height:1.55}

    /* ── OPTIONS ─────────────────────────────────── */
    .opts{display:flex;flex-direction:column;gap:8px}
    .opt{display:flex;align-items:center;gap:13px;padding:13px 16px;
      border:2px solid var(--border);border-radius:10px;cursor:pointer;
      user-select:none;background:var(--card);touch-action:manipulation;
      transition:border-color var(--ease),background var(--ease),transform .1s}
    .opt:hover{border-color:var(--blue);background:var(--blue-l)}
    .opt:active{transform:scale(.99)}
    .opt.sel{border-color:var(--blue);background:var(--blue-l)}
    .opt.dim{opacity:.35;pointer-events:none}
    .dot{width:20px;height:20px;border-radius:50%;border:2px solid #C8C4BC;
      flex-shrink:0;display:flex;align-items:center;justify-content:center;
      transition:all var(--ease)}
    .opt.sel .dot{background:var(--blue);border-color:var(--blue)}
    .opt.sel .dot::after{content:'';width:7px;height:7px;border-radius:50%;background:#fff}
    .opt.chk .dot{border-radius:6px}
    .opt.chk.sel .dot::after{content:'✓';font-size:11px;font-weight:700;color:#fff;line-height:1}
    .opt-lbl{font-size:14.5px;color:var(--t1);line-height:1.45}

    /* ── FIELDS ──────────────────────────────────── */
    .field{width:100%;padding:13px 16px;border:2px solid var(--border);border-radius:10px;
      font-size:15px;color:var(--t1);background:var(--card);outline:none;
      transition:border-color var(--ease),box-shadow var(--ease)}
    .field:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-m)}
    textarea.field{resize:none;min-height:110px;line-height:1.6}
    .hint{font-size:12px;color:var(--t3);margin-top:6px;text-align:right}

    /* ── SCALE 1–5 ───────────────────────────────── */
    .scale{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    .sb{display:flex;flex-direction:column;align-items:center;gap:5px;
      padding:14px 6px;border:2px solid var(--border);border-radius:10px;
      cursor:pointer;user-select:none;background:var(--card);touch-action:manipulation;
      transition:all var(--ease)}
    .sb:hover,.sb.sel{border-color:var(--blue);background:var(--blue-l)}
    .se{font-size:20px;line-height:1}
    .sn{font-size:16px;font-weight:500;color:var(--navy);line-height:1}
    .sl{font-size:9.5px;text-align:center;color:var(--t2);line-height:1.3}

    /* ── STARS ───────────────────────────────────── */
    .stars{display:flex;gap:6px}
    .star{font-size:30px;color:#DDD8D0;cursor:pointer;
      transition:color .1s,transform .1s;line-height:1;touch-action:manipulation}
    .star:hover,.star.on{color:var(--amber)}
    .star:active{transform:scale(.9)}
    .star-lbl{font-size:13px;color:var(--t2);margin-top:6px;min-height:20px}

    /* ── SEC LABEL ───────────────────────────────── */
    .sec{display:block;font-size:11px;font-weight:600;letter-spacing:2.5px;
      text-transform:uppercase;color:var(--t3);margin:22px 0 10px}
    .sec:first-child{margin-top:0}

    /* ── CONCEPT ─────────────────────────────────── */
    .concept{background:var(--navy);border-radius:12px;padding:22px 20px;margin-bottom:22px}
    .ctag{font-size:10px;font-weight:500;letter-spacing:3px;text-transform:uppercase;
      color:rgba(255,255,255,.32);margin-bottom:12px;display:block}
    .cbody{font-size:15px;color:rgba(255,255,255,.82);line-height:1.65;font-weight:300}
    .cbody strong{color:#fff;font-weight:500}
    .cpills{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
    .cp{font-size:11px;padding:4px 10px;border-radius:20px;
      background:rgba(255,255,255,.09);color:rgba(255,255,255,.65);
      border:1px solid rgba(255,255,255,.14)}

    /* ── WELCOME ─────────────────────────────────── */
    .wlc{text-align:center;padding:8px 0 4px}
    .wicon{width:80px;height:80px;background:var(--navy);border-radius:20px;
      margin:0 auto 26px;display:flex;align-items:center;justify-content:center}
    .wh{font-size:25px;font-weight:500;color:var(--navy);margin-bottom:12px;line-height:1.3}
    .wp{font-size:15.5px;color:var(--t2);line-height:1.65;margin-bottom:26px;
      max-width:420px;margin-left:auto;margin-right:auto}
    .pills{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-bottom:32px}
    .pill{font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;
      background:var(--blue-l);color:var(--blue);border:1px solid rgba(26,111,191,.18)}
    .btn-cta{display:inline-flex;align-items:center;justify-content:center;gap:8px;
      background:var(--navy);color:#fff;border:none;padding:15px 34px;border-radius:10px;
      font-size:16px;font-weight:500;cursor:pointer;touch-action:manipulation;
      transition:background var(--ease),transform .1s}
    .btn-cta:hover{background:#162d5a;transform:translateY(-1px)}
    .btn-cta:active{transform:translateY(0)}
    .note{font-size:12px;color:var(--t3);margin-top:14px}

    /* ── EMAIL BOX ───────────────────────────────── */
    .ebox{margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
    .ebox.hid{display:none}
    .ehint{font-size:13px;color:var(--t2);margin-bottom:10px;line-height:1.5}

    /* ── EARLY EMAIL ─────────────────────────────── */
    .ebtns{display:flex;flex-direction:column;gap:10px;margin-top:4px}
    .btn-ghost{background:none;border:none;color:var(--t2);font-size:14px;
      cursor:pointer;padding:8px;transition:color var(--ease)}
    .btn-ghost:hover{color:var(--t1)}

    /* ── THANKS ──────────────────────────────────── */
    .ty{min-height:calc(100vh - 56px);display:flex;flex-direction:column;
      align-items:center;justify-content:center;text-align:center;
      padding:40px 20px 60px}
    .ty-icon{width:90px;height:90px;background:var(--navy);border-radius:22px;
      display:flex;align-items:center;justify-content:center;margin:0 auto 28px}
    .ty-h{font-size:25px;font-weight:500;color:var(--navy);margin-bottom:12px;
      line-height:1.35;max-width:380px}
    .ty-p{font-size:15.5px;color:var(--t2);max-width:380px;margin:0 auto 28px;line-height:1.65}
    .badge{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;
      border-radius:24px;font-size:13.5px;font-weight:500}
    .b-green{background:var(--green-l);color:var(--green);border:1px solid rgba(22,163,74,.2)}
    .b-blue{background:var(--blue-l);color:var(--blue);border:1px solid rgba(26,111,191,.2)}
    .ty-foot{margin-top:30px;font-size:13px;color:var(--t3);line-height:1.8}

    /* ── NAV BAR ─────────────────────────────────── */
    .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.93);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border-top:1px solid rgba(0,0,0,.07);padding:10px 16px 14px;z-index:100}
    .nav.off{display:none}
    .nav-in{max-width:580px;margin:0 auto;display:flex;
      align-items:center;justify-content:space-between;gap:12px}
    .btn-bk{display:flex;align-items:center;gap:6px;background:none;
      border:2px solid var(--border);color:var(--t2);padding:10px 18px;
      border-radius:9px;font-size:14.5px;cursor:pointer;touch-action:manipulation;
      transition:all var(--ease)}
    .btn-bk:hover{border-color:var(--navy);color:var(--navy)}
    .btn-bk:disabled{opacity:.3;pointer-events:none}
    .btn-nx{display:flex;align-items:center;justify-content:center;gap:7px;
      background:var(--navy);color:#fff;border:none;padding:12px 26px;
      border-radius:9px;font-size:15px;font-weight:500;cursor:pointer;flex:1;
      max-width:240px;touch-action:manipulation;transition:background var(--ease),transform .1s}
    .btn-nx:hover{background:#162d5a}
    .btn-nx:active{transform:scale(.98)}
    .btn-nx:disabled{background:#9CA3AF;cursor:not-allowed}

    /* ── ERROR ───────────────────────────────────── */
    .err{font-size:13px;color:var(--red);margin-top:10px;display:none}
    .err.on{display:block}

    /* ── RESPONSIVE ──────────────────────────────── */
    @media(max-width:480px){
      .main{padding:20px 12px 120px}
      .card{padding:24px 18px 22px}
      .q{font-size:17px}
      .scale{gap:5px}
      .sb{padding:12px 4px}
      .se{font-size:17px}
      .sn{font-size:14px}
      .sl{font-size:9px}
      .wh{font-size:21px}
      .ty-h{font-size:22px}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms !important}
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-in">
    <div class="logo">
      <svg width="22" height="23" viewBox="0 0 56 58" fill="none" aria-hidden="true">
        <path fill-rule="evenodd" d="M28 4 L50 23 Q53 26 53 29 L53 54 Q53 57 50 57 L6 57 Q3 57 3 54 L3 29 Q3 26 6 23 Z M19 57 L19 40 A9 9 0 0 1 37 40 L37 57 Z" fill="white"/>
      </svg>
      <span class="logo-txt">homie</span>
    </div>
    <span class="ctr" id="ctr" aria-live="polite">Cuestionario de validación</span>
  </div>
  <div class="prog-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="prog-track">
    <div class="prog-fill" id="prog"></div>
  </div>
</header>

<!-- MAIN -->
<main class="main" id="main">
  <div class="wrap" id="step"></div>
</main>

<!-- NAV -->
<div class="nav off" id="nav">
  <div class="nav-in">
    <button class="btn-bk" id="btn-bk" onclick="goBack()">← Atrás</button>
    <button class="btn-nx" id="btn-nx" onclick="goNext()">Siguiente →</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIGURACIÓN — reemplaza YOUR_FORMSPREE_ID con tu ID real
════════════════════════════════════════════════════════════ */
const FORMSPREE = 'YOUR_FORMSPREE_ID';

/* ═══════════════════════════════════════════════════════════
   ESTADO GLOBAL
════════════════════════════════════════════════════════════ */
const S = {
  cur: 'welcome',   // paso actual
  hist: [],         // pila de navegación (para "Atrás")
  dir: 'f',         // 'f' forward | 'b' backward
  rama: '',         // 'A' | 'B' | 'C'
  a: {}             // todas las respuestas
};

/* ═══════════════════════════════════════════════════════════
   MAPA DE PROGRESO (% por paso)
════════════════════════════════════════════════════════════ */
const PROG = {
  welcome:0, p1:7, p2:16, p3:24,
  a1:32, a2:40, b1:32, c1:32, c2:40,
  p4:49, p5:57, p6:65, p7:72, p8:79,
  'p8b':82, 'p9-basic':86, 'p9-silver':86, 'p9-gold':86, p10:91, p11:96, p12:100,
  early_q:12, early_email:22, thanks:100
};

/* ═══════════════════════════════════════════════════════════
   DATOS DE PASOS
════════════════════════════════════════════════════════════ */
const STEPS = {
  welcome: {type:'welcome'},

  p1:{type:'radio',num:1,
    q:'¿Cuántos pisos o inmuebles tienes actualmente en alquiler?',
    sub:'Incluye cualquier tipo: piso, local, garaje o nave.',
    opts:[
      {v:'1',    l:'Solo 1'},
      {v:'2-3',  l:'2 a 3'},
      {v:'4-10', l:'4 a 10'},
      {v:'mas10',l:'Más de 10'},
      {v:'0',    l:'Ninguno todavía, pero tengo pensado alquilar'}
    ]},

  early_q:{type:'radio',
    q:'¿Estás pensando en invertir en pisos próximamente?',
    sub:'Tu opinión es muy valiosa aunque todavía no seas propietario.',
    opts:[
      {v:'pronto',l:'Sí, en los próximos 12 meses'},
      {v:'largo', l:'Sí, pero a más largo plazo'},
      {v:'no',    l:'No por ahora'}
    ]},

  early_email:{type:'early_email'},

  p2:{type:'radio',num:2,
    q:'¿Cómo describes tu perfil como propietario?',
    opts:[
      {v:'particular',  l:'Propietario particular — el alquiler es un ingreso complementario'},
      {v:'inversor',    l:'Pequeño inversor — varios pisos como estrategia de inversión'},
      {v:'gestor_prof', l:'Gestor profesional — administro pisos para terceros'},
      {v:'family',      l:'Family office o empresa patrimonial'}
    ]},

  p3:{type:'radio',num:3,
    q:'¿Cómo gestionas tus pisos actualmente?',
    sub:'Elige la opción que mejor describe tu situación real.',
    opts:[
      {v:'manual',     l:'Yo solo, con Excel, notas o WhatsApp'},
      {v:'app',        l:'Yo solo, con una app o software específico'},
      {v:'gestor',     l:'Tengo una agencia o gestor que lo hace'},
      {v:'mix',        l:'Combinación: yo gestiono parte y externalizo otra'}
    ]},

  /* ── RAMA A ─ tiene gestor ─────────────────────── */
  a1:{type:'multi',num:'3-A',rama:'A',
    q:'¿Qué hace exactamente tu gestor o agencia?',
    sub:'Selecciona todo lo que aplique.',
    opts:[
      {v:'cobrar',  l:'Cobrar y gestionar la renta mensual'},
      {v:'averias', l:'Gestionar averías y coordinar proveedores'},
      {v:'contratos',l:'Contratos, altas y bajas de inquilinos'},
      {v:'fiscal',  l:'Gestión fiscal y declaración de la renta'},
      {v:'comun',   l:'Comunicación diaria con inquilinos'},
      {v:'todo',    l:'Todo lo anterior — gestión integral'}
    ]},

  a2:{type:'manager',num:'3-B',rama:'A',
    q:'¿Cuánto pagas y qué tan satisfecho estás con tu gestor?',
    priceOpts:[
      {v:'menos30',   l:'Menos de 30 €/mes'},
      {v:'30-80',     l:'30 – 80 €/mes'},
      {v:'80-150',    l:'80 – 150 €/mes'},
      {v:'mas150',    l:'Más de 150 €/mes'},
      {v:'porciento', l:'Un % de la renta (5–10%)'}
    ]},

  /* ── RAMA B ─ solo sin app ─────────────────────── */
  b1:{type:'radio',num:'3-B',rama:'B',
    q:'¿Por qué no usas ninguna app para gestionar tus pisos?',
    sub:'La honestidad nos ayuda a construir algo útil de verdad.',
    opts:[
      {v:'no_enc',   l:'No he encontrado ninguna que me convenza'},
      {v:'no_sabia', l:'No sabía que existían apps para esto'},
      {v:'ok_hoy',   l:'Me arreglo bien con mis métodos actuales'},
      {v:'precio',   l:'El precio no me justifica el cambio'},
      {v:'pocos',    l:'Tengo pocos pisos, no creo que lo necesite'}
    ]},

  /* ── RAMA C ─ usa app ──────────────────────────── */
  c1:{type:'text',num:'3-C',rama:'C',req:true,
    q:'¿Qué app o software usas para gestionar tus pisos?',
    sub:'Escribe el nombre — esto nos ayuda a entender el mercado.',
    ph:'Ej: Homming, Rentger, Rentila...'},

  c2:{type:'apprating',num:'3-D',rama:'C',
    q:'¿Qué nota le das y qué es lo que más te falta?',
    sub:'Cuanto más específico seas, mejor.'},

  /* ── BLOQUE DOLOR ──────────────────────────────── */
  p4:{type:'radio',num:4,
    q:'¿Cuánto tiempo dedicas al mes a gestionar tus pisos?',
    sub:'Cobros, incidencias, papeles, consultas de inquilinos...',
    opts:[
      {v:'menos1',l:'Menos de 1 hora — lo tengo muy optimizado'},
      {v:'1-3',   l:'1 a 3 horas'},
      {v:'3-8',   l:'3 a 8 horas'},
      {v:'mas8',  l:'Más de 8 horas — me quita demasiado tiempo'}
    ]},

  p5:{type:'multi',num:5,max:3,
    q:'¿Qué es lo que más estrés o tiempo te genera?',
    sub:'Elige hasta 3 opciones. Solo las que apliquen de verdad.',
    opts:[
      {v:'averias',    l:'Gestionar averías — buscar fontanero, electricista...'},
      {v:'cobros',     l:'Seguimiento de cobros e impagos'},
      {v:'papeleo',    l:'Papeleo de contratos y documentación'},
      {v:'fiscal',     l:'La declaración de la renta y la fiscalidad'},
      {v:'whatsapp',   l:'WhatsApp interminable con inquilinos'},
      {v:'rentab',     l:'No sé cuánto me renta realmente cada piso'},
      {v:'gastos',     l:'Control de gastos y facturas'},
      {v:'renovacion', l:'Renovaciones y actualización de renta'}
    ]},

  p6:{type:'radio',num:6,
    q:'¿Cuándo fue la última vez que un problema con un piso te robó más tiempo del que querías?',
    sub:'Una avería, un impago, un trámite complicado...',
    opts:[
      {v:'semana',  l:'Esta semana'},
      {v:'mes',     l:'Este mes'},
      {v:'2-3m',    l:'Hace 2 ó 3 meses'},
      {v:'mas6m',   l:'Hace más de 6 meses'},
      {v:'nunca',   l:'Nunca — lo tengo muy bien controlado'}
    ]},

  /* ── BLOQUE VALIDACIÓN ─────────────────────────── */
  p7:{type:'concept',num:7},

  p8:{type:'radio',num:8,
    q:'¿Qué funcionalidad te haría decidir usarla?',
    sub:'Elige solo una — la que más valor tendría para ti ahora mismo.',
    opts:[
      {v:'averias',  l:'Gestión automática de averías con red de proveedores'},
      {v:'cobros',   l:'Cobros automáticos y alertas de impago'},
      {v:'fiscal',   l:'Declaración de renta preparada automáticamente'},
      {v:'dashb',    l:'Dashboard con rentabilidad real de cada piso'},
      {v:'central',  l:'Todo centralizado — contratos, facturas y comunicación'},
      {v:'portal',   l:'Portal del inquilino para que gestionen sus peticiones'}
    ]},

  p8b:{type:'radio',num:'8-B',
    q:'¿Con cuál de estos perfiles te identificas más?',

/* ═══════════════════════════════════════════════════════════
   LÓGICA DE NAVEGACIÓN
════════════════════════════════════════════════════════════ */
function nextFor(from, ans) {
  switch(from) {
    case 'welcome':     return 'p1';
    case 'p1':          return ans === '0' ? 'early_q' : 'p2';
    case 'early_q':     return ans === 'no' ? 'thanks' : 'early_email';
    case 'early_email': return 'thanks';
    case 'p2':          return 'p3';
    case 'p3':
      if(ans==='manual'){S.rama='B';return 'b1';}
      if(ans==='app')   {S.rama='C';return 'c1';}
      S.rama='A'; return 'a1';
    case 'a1': return 'a2';
    case 'a2': return 'p4';
    case 'b1': return 'p4';
    case 'c1': return 'c2';
    case 'c2': return 'p4';
    case 'p4': return 'p5';
    case 'p5': return 'p6';
    case 'p6': return 'p7';
    case 'p7': return 'p8';
    case 'p8': return 'p8b';
    case 'p8b': return S.a.p8b==='silver' ? 'p9-silver' : S.a.p8b==='gold' ? 'p9-gold' : 'p9-basic';
    case 'p9-basic':
    case 'p9-silver':
    case 'p9-gold':  return 'p10';
    case 'p10': return 'p11';
    case 'p11': return 'p12';
    case 'p12': return 'thanks';
    default:   return 'thanks';
  }
}

/* ═══════════════════════════════════════════════════════════
   VALIDACIÓN
════════════════════════════════════════════════════════════ */
function validate() {
  const s = STEPS[S.cur]; if(!s) return true;
  const bad = m => { showErr(m); return false; };
  switch(s.type) {
    case 'radio':
      return S.a[S.cur] ? true : bad('Por favor, selecciona una opción para continuar.');
    case 'multi':
      return (S.a[S.cur]||[]).length>0 ? true : bad('Selecciona al menos una opción.');
    case 'text':
      return (!s.req||(S.a[S.cur]||'').trim()) ? true : bad('Por favor, escribe tu respuesta.');
    case 'textarea':
      return (!s.req||(S.a[S.cur]||'').trim().length>=8) ? true : bad('Por favor, escribe al menos unas palabras.');
    case 'concept':
      return S.a.p7_score ? true : bad('Por favor, selecciona una puntuación.');
    case 'manager':
      if(!S.a.a2_price)  return bad('Indica cuánto pagas a tu gestor.');
      if(!S.a.a2_rating) return bad('Puntúa tu nivel de satisfacción con el gestor.');
      return true;
    case 'apprating':
      return S.a.c2_rating ? true : bad('Por favor, puntúa la app que usas.');
    case 'beta':
      return S.a.p12_choice ? true : bad('Por favor, selecciona una opción.');
    default: return true;
  }
}
function showErr(m){const e=_('err');if(e){e.textContent=m;e.classList.add('on')}}
function clearErr(){const e=_('err');if(e)e.classList.remove('on')}

/* ═══════════════════════════════════════════════════════════
   NAVEGACIÓN
════════════════════════════════════════════════════════════ */
async function goNext() {
  clearErr();
  if(!validate()) return;
  collect();
  const ans  = S.a[S.cur];
  const next = nextFor(S.cur, ans);
  if(next==='thanks'){
    const b=_('btn-nx');
    if(b){b.disabled=true;b.textContent='Enviando...';}
    await send();
  }
  S.hist.push(S.cur);
  S.dir='f';
  go(next);
}

function goBack(){
  if(!S.hist.length) return;
  S.dir='b';
  go(S.hist.pop());
}

function go(id){
  S.cur=id;
  render(); updateProg(); updateNav();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ═══════════════════════════════════════════════════════════
   RECOPILAR RESPUESTAS
════════════════════════════════════════════════════════════ */
function collect(){
  const s=STEPS[S.cur]; if(!s) return;
  if(s.type==='text'){const e=_('txt');if(e)S.a[S.cur]=e.value.trim();}
  if(s.type==='textarea'){const e=_('txa');if(e)S.a[S.cur]=e.value.trim();}
  if(s.type==='beta'){const e=_('email-in');if(e)S.a.email=e.value.trim();}
}

/* ═══════════════════════════════════════════════════════════
   PROGRESO
════════════════════════════════════════════════════════════ */
function updateProg(){
  const p=PROG[S.cur]||0;
  const b=_('prog'); if(b){b.style.width=p+'%';}
  const t=_('prog-track'); if(t) t.setAttribute('aria-valuenow',p);
  const c=_('ctr'); if(c){
    const s=STEPS[S.cur];
    c.textContent=(s&&s.num)
      ? (typeof s.num==='number'?`Pregunta ${s.num} de 13`:`Pregunta ${s.num}`)
      : 'Cuestionario de validación';
  }
}

function updateNav(){
  const hidden=['welcome','thanks','early_email'].includes(S.cur);
  _('nav').classList.toggle('off',hidden);
  if(!hidden){
    const nx=_('btn-nx');
    if(nx){nx.disabled=false;nx.textContent=S.cur==='p12'?'Enviar respuestas ':'Siguiente →';}
    const bk=_('btn-bk');
    if(bk) bk.disabled=S.hist.length===0;
  }
}

/* ═══════════════════════════════════════════════════════════
   RENDER ENGINE
════════════════════════════════════════════════════════════ */
function render(){
  const s=STEPS[S.cur]; if(!s) return;
  const cls=S.dir==='f'?'aR':'aL';
  const map={
    welcome:    ()=>html_welcome(),
    radio:      ()=>html_radio(s,cls),
    multi:      ()=>html_multi(s,cls),
    text:       ()=>html_text(s,cls),
    textarea:   ()=>html_textarea(s,cls),
    concept:    ()=>html_concept(cls),
    manager:    ()=>html_manager(cls),
    apprating:  ()=>html_apprating(cls),
    beta:       ()=>html_beta(s,cls),
    early_email:()=>html_early_email(cls),
    thanks:     ()=>html_thanks()
  };
  _('step').innerHTML=(map[s.type]||(() => ''))();
  // Focus first input
  const f=_('txt')||_('txa');
  if(f) setTimeout(()=>f.focus(),320);
}

function eb(s){
  if(!s||!s.num) return '';
  const star=S.cur==='p11';
  return `<span class="eyebrow${star?' gold':''}">${star?'⭐ ':''}Pregunta ${s.num}${star?' — La más importante':''}</span>`;

function optHtml(o,type,stepId,sel,max=99){
  const isChk=type==='multi';
  const isSel=isChk?(sel||[]).includes(o.v):sel===o.v;
  const isDim=isChk&&!isSel&&(sel||[]).length>=max;
  const fn=isChk?`toggleMulti('${stepId}','${o.v}',${max})`:`pickRadio('${stepId}','${o.v}')`;
  return `<div class="opt${isChk?' chk':''}${isSel?' sel':''}${isDim?' dim':''}"
    data-step="${stepId}" data-val="${o.v}"
    onclick="${fn}" role="${isChk?'checkbox':'radio'}"
    aria-checked="${isSel}" tabindex="0"
    onkeydown="if(event.key==='Enter'||event.key===' '){${fn};event.preventDefault()}">
    <div class="dot"></div><span class="opt-lbl">${o.l}</span></div>`;
}

    ?'Estás en la lista de acceso anticipado a la beta. Sin spam, sin compromiso. Solo un email cuando lancemos.'
    :'Hemos recibido tus respuestas. Cada respuesta nos ayuda a construir algo que de verdad valga la pena.';
  const bcls=hasEmail?'b-blue':'b-green';
  const btxt=hasEmail?'En lista de acceso anticipado':' Respuesta recibida';
  return `<div class="ty">
    <div class="ty-icon aPop">
      <svg width="50" height="52" viewBox="0 0 56 58" fill="none" aria-hidden="true">
        <path fill-rule="evenodd" d="M28 4 L50 23 Q53 26 53 29 L53 54 Q53 57 50 57 L6 57 Q3 57 3 54 L3 29 Q3 26 6 23 Z M19 57 L19 40 A9 9 0 0 1 37 40 L37 57 Z" fill="white"/>
      </svg>
    </div>
    <h1 class="ty-h">${title}</h1>
    <p class="ty-p">${desc}</p>
    <span class="badge ${bcls}">${btxt}</span>
    <div class="ty-foot">
      <p>¿Conoces a alguien más con pisos en alquiler?</p>
      <p>Su opinión también nos ayuda a construir Homie.</p>
      <p style="margin-top:20px;font-size:11.5px">homie · gestión inmobiliaria 360 · homie.es</p>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   MANEJADORES DE EVENTOS
════════════════════════════════════════════════════════════ */
function pickRadio(stepId, val){
  S.a[stepId]=val; clearErr();
  document.querySelectorAll(`.opt[data-step="${stepId}"]`).forEach(el=>{
    const ok=el.dataset.val===val;
    el.classList.toggle('sel',ok);
    el.setAttribute('aria-checked',ok);
  });
  setTimeout(()=>{if(S.cur===stepId) goNext();},300);
}

function toggleMulti(stepId, val, max){
  let sel=S.a[stepId]||[]; clearErr();
  // 'nada' es exclusivo con el resto
  if(val==='nada'){
    sel=sel.includes('nada')?[]:['nada'];
  } else {
    sel=sel.filter(v=>v!=='nada');
    sel=sel.includes(val)?sel.filter(v=>v!==val):(sel.length<max?[...sel,val]:sel);
  }
  S.a[stepId]=sel;
  document.querySelectorAll('#multi-list .opt').forEach(el=>{
    const v=el.dataset.val;
    const isSel=sel.includes(v);
    const isDim=!isSel&&sel.length>=max;
    el.classList.toggle('sel',isSel);
    el.classList.toggle('dim',isDim);
    el.setAttribute('aria-checked',isSel);
  });
}

function pickScore(n){
  S.a.p7_score=n; clearErr();
  document.querySelectorAll('.sb').forEach((el,i)=>{
    el.classList.toggle('sel',i+1===n);
    el.setAttribute('aria-checked',i+1===n);
  });
  setTimeout(()=>{if(S.cur==='p7') goNext();},300);
}

function pickMgrPrice(val){
  S.a.a2_price=val; clearErr();
  document.querySelectorAll('#price-list .opt').forEach(el=>{
    const ok=el.dataset.val===val;
    el.classList.toggle('sel',ok);
    el.setAttribute('aria-checked',ok);
  });
}

function setStar(key,n){
  if(key==='a2') S.a.a2_rating=n;
  if(key==='c2') S.a.c2_rating=n;
  clearErr(); updStarUI(key,n);
}
function hoverStar(key,n){updStarUI(key,n,true);}
function resetStar(key){
  const v=key==='a2'?(S.a.a2_rating||0):(S.a.c2_rating||0);
  updStarUI(key,v);
}
function updStarUI(key,n){
  document.querySelectorAll(`#stars-${key} .star`).forEach((el,i)=>el.classList.toggle('on',i<n));
  const labels=key==='a2'?SLBL_A2:SLBL_C2;
  const l=_(`stlbl-${key}`);
  if(l) l.textContent=n?labels[n]:'Haz clic para puntuar';
}

function pickBeta(val,showEmail){
  S.a.p12_choice=val; clearErr();
  document.querySelectorAll('.opt[data-step="p12"]').forEach(el=>{
    const ok=el.dataset.val===val;
    el.classList.toggle('sel',ok);
    el.setAttribute('aria-checked',ok);
  });
  const box=_('ebox');
  if(box) box.classList.toggle('hid',!showEmail);
}

function startSurvey(){
  S.hist.push('welcome'); S.dir='f';
  go('p1'); updateNav();
}

async function submitEarly(){
  const e=_('early-em'); if(e) S.a.email=e.value.trim();
  await send(); go('thanks');
}
async function skipEarly(){
  S.a.email=''; await send(); go('thanks');
}

function updCount(el){
  const c=_('charcnt'); if(c) c.textContent=el.value.length+' caracteres';
  clearErr();
}

/* ═══════════════════════════════════════════════════════════
   ENVÍO A FORMSPREE
════════════════════════════════════════════════════════════ */
async function send(){
  const a=S.a;
  const payload={
    '_subject': 'Nueva respuesta — Cuestionario validación Homie v1',
    'source':   'survey-validacion-v1',
    'rama':     S.rama||'—',

    // Perfil
    'P1_pisos_alquiler': a.p1||'',
    'P2_perfil':         a.p2||'',
    'P3_gestion':        a.p3||'',

    // Rama A — gestor
    'A1_que_hace_gestor':     (a.a1||[]).join(', '),
    'A2_precio_gestor':       a.a2_price||'',
    'A2_satisfaccion_gestor': a.a2_rating?`${a.a2_rating}/5`:'',

    // Rama B — solo sin app
    'B1_por_que_no_app': a.b1||'',

    // Rama C — usa app
    'C1_app_actual':    a.c1||'',
    'C2_nota_app':      a.c2_rating?`${a.c2_rating}/5`:'',
    'C2_que_le_falta':  a.c2_missing||'',

    // Dolor
    'P4_tiempo_mes':    a.p4||'',
    'P5_puntos_dolor':  (a.p5||[]).join(', '),
    'P6_ultima_crisis': a.p6||'',

    // Validación
    'P7_concepto_score':    a.p7_score?`${a.p7_score}/5`:'',
    'P8_funcionalidad_top': a.p8||'',
    'P8B_perfil_plan':      a.p8b||'',
    'P9_precio_dispuesto':  a['p9-basic']||a['p9-silver']||a['p9-gold']||'',

    // Cierre
    'P10_frenos':      (a.p10||[]).join(', '),
    'P11_cosa_magica': a.p11||'',
    'P12_quiere_beta': a.p12_choice||'',
    'Email':           a.email||'',

    // Early exit
    'EarlyExit_piensa_invertir': a.early_q||''
  };

  if(FORMSPREE==='YOUR_FORMSPREE_ID'){
    console.log(' [DEV] Payload que se enviaría a Formspree:', payload);
    return;
  }
  try{
    await fetch(`https://formspree.io/f/${FORMSPREE}`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify(payload)
    });
  } catch(e){ console.warn('Formspree error (continuando):', e); }
}

/* ═══════════════════════════════════════════════════════════

function _(id){return document.getElementById(id);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ═══════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
go('welcome');
</script>
